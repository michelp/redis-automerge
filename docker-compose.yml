services:
  redis:
    build: .
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    # The published Docker image (Dockerfile CMD) does NOT enable DEBUG, so end
    # users get a safe default. This local/test stack re-enables it because the
    # AOF persistence tests use `DEBUG RESTART` (see scripts/tests/lib/common.sh).
    # Keep this flag list in sync with the Dockerfile CMD; only the trailing
    # `--enable-debug-command yes` should differ.
    command:
      - redis-server
      - --loadmodule
      - /usr/lib/redis/modules/redis-automerge.so
      - --loglevel
      - notice
      - --logfile
      - ""
      - --slowlog-log-slower-than
      - "0"
      - --slowlog-max-len
      - "128"
      - --notify-keyspace-events
      - KEA
      - --dir
      - /data
      - --save
      - ""
      - --appendonly
      - "yes"
      - --appendfilename
      - appendonly.aof
      - --appendfsync
      - everysec
      - --aof-use-rdb-preamble
      - "no"
      - --enable-debug-command
      - "yes"

  webdis:
    image: nicolas/webdis:latest
    depends_on:
      - redis
    ports:
      - "7379:7379"
    environment:
      REDIS_HOST: redis
    restart: unless-stopped

  test:
    image: redis:7
    depends_on:
      - redis
      - webdis
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: ["bash", "scripts/tests/run-all-tests.sh"]
    environment:
      REDIS_HOST: redis
      WEBDIS_HOST: webdis
      WEBDIS_PORT: 7379

  test-python:
    build:
      context: ./scripts/tests/python
      dockerfile: Dockerfile
    depends_on:
      - redis
    volumes:
      - ./scripts/tests/python:/tests
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  redis-data:
